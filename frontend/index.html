<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de Suporte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-indigo-100 h-screen flex flex-col overflow-hidden">
    <header class="bg-gradient-to-br from-blue-500 to-purple-600 
                    text-white p-4 text-center shadow-lg">
        <h1 class="text-2xl md:text-3xl font-bold">Chat de Suporte</h1>
        <p class="text-gray-100 mt-1">Estamos aqui para ajudar!</p>
    </header>
    <div id="chatContainer" 
         class="flex-1 min-h-0 overflow-y-auto p-4 space-y-4 max-w-4xl mx-auto w-full px-4 md:px-8 lg:px-16 shadow-lg 
         bg-gradient-to-t from-blue-200 to-purple-200">
        <!-- Mensagens serão adicionadas aqui -->
    </div>
    <div class="shrink-0 p-4 bg-white border-t shadow-lg max-w-4xl mx-auto w-full px-4 md:px-8 lg:px-16">
        <div class="flex gap-2">
            <input id="input" type="text" class="flex-1 border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all" placeholder="Digite 1, 2, 3 ou 4...">
            <button id="sendBtn" class="bg-gray-500 hover:bg-purple-600 text-white px-6 py-3 rounded-lg font-medium transition-all shadow-md">Enviar</button>
        </div>
    </div>
</body>
</html>
